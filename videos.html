<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Videos — GM Studio</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js"></script>
  <script src="js/components.js"></script>
  <style>
    .video-modal { position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center; }
    .video-modal.open { display:flex; }
    .video-modal-inner { position:relative;width:90vw;max-width:960px; }
    .video-modal-inner video { width:100%;border:1px solid var(--border);display:block; }
    .video-modal-close { position:absolute;top:-44px;right:0;color:var(--text-muted);font-size:2rem;cursor:pointer;line-height:1;transition:color .2s; }
    .video-modal-close:hover { color:var(--accent); }
    .video-thumb { cursor:pointer; }
  </style>
</head>
<body>

  <div id="header-placeholder"></div>

  <div class="page-hero">
    <span class="section-label">Motion stories</span>
    <h1>Videos<em>.</em></h1>
    <p>Films &middot; BTS &middot; Reels &middot; Timelapses</p>
  </div>

  <!-- Featured video -->
  <section style="background:var(--bg-2);">
    <span class="section-label">Featured film</span>
    <h2 class="section-title" data-reveal id="featured-title">Mumbai — <em>A City Breathes</em></h2>
    <div class="divider"></div>
    <div style="margin-top:36px;max-width:900px;" data-reveal>
      <div id="featured-player" style="position:relative;aspect-ratio:16/9;background:var(--bg-3);border:1px solid var(--border);overflow:hidden;cursor:pointer;">
        <img id="featured-poster" src="" alt="Featured video" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;" />
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;">
          <div class="play-btn" style="width:72px;height:72px;font-size:1.4rem;">&#9654;</div>
        </div>
      </div>
      <p id="featured-desc" style="margin-top:14px;color:var(--text-muted);font-size:.82rem;line-height:1.75;"></p>
    </div>
  </section>

  <!-- Video grid -->
  <section>
    <span class="section-label">All videos</span>
    <h2 class="section-title" data-reveal>Watch the <em>collection</em></h2>
    <div class="videos-grid" id="video-grid"></div>
  </section>

  <div class="cta-strip">
    <h2>Need a <em>cinematic film</em> for your event?</h2>
    <p>We produce wedding films, brand docs, and travel reels with the same eye we bring to photography.</p>
    <a href="contact.html" class="btn btn-solid">Let's talk video</a>
  </div>

  <div id="footer-placeholder"></div>

  <!-- Video modal -->
  <div class="video-modal" id="video-modal">
    <div class="video-modal-inner">
      <span class="video-modal-close" id="video-modal-close">&times;</span>
      <video id="modal-video" controls preload="none"></video>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const modal    = document.getElementById('video-modal');
      const modalVid = document.getElementById('modal-video');
      const closeBtn = document.getElementById('video-modal-close');

      function openVideo(url) {
        modalVid.src = url;
        modal.classList.add('open');
        document.body.style.overflow = 'hidden';
        modalVid.play().catch(() => {});
      }
      function closeVideo() {
        modal.classList.remove('open');
        modalVid.pause();
        modalVid.src = '';
        document.body.style.overflow = '';
      }
      closeBtn.addEventListener('click', closeVideo);
      modal.addEventListener('click', e => { if (e.target === modal) closeVideo(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVideo(); });

      // Featured
      const fv = GM.videos.featured;
      const fp = document.getElementById('featured-poster');
      const fd = document.getElementById('featured-desc');
      if (fp) fp.src = GM.asset(fv.poster);
      if (fd) fd.textContent = fv.desc;
      document.getElementById('featured-player').addEventListener('click', () => openVideo(GM.asset(fv.file)));

      // Grid
      const grid = document.getElementById('video-grid');
      ['v1','v2','v3','v4','v5'].forEach(k => {
        const v = GM.videos[k];
        if (!v) return;
        const url = GM.asset(v.file);
        const poster = GM.asset(v.poster);
        grid.innerHTML += `
          <div class="video-card" data-reveal>
            <div class="video-thumb" onclick="document.getElementById('modal-video').src='${url}';document.getElementById('video-modal').classList.add('open');document.body.style.overflow='hidden';document.getElementById('modal-video').play().catch(()=>{});">
              <div style="position:relative;width:100%;height:100%;background:var(--bg-3);">
                <img src="${poster}" alt="${v.title}" loading="lazy"
                  style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;"
                  onerror="this.style.display='none'" />
                <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
                  <div class="play-btn">&#9654;</div>
                </div>
              </div>
            </div>
            <div class="video-info">
              <h3>${v.title}</h3>
              <p>${v.desc}</p>
              <span class="video-tag">${v.tag}</span>
            </div>
          </div>`;
      });
    });
  </script>
</body>
</html>
