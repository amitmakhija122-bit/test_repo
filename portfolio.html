<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — GM Studio</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js"></script>
  <script src="js/components.js"></script>
</head>
<body>

  <div id="header-placeholder"></div>

  <div class="page-hero">
    <span class="section-label">Our work</span>
    <h1>Portfolio<em>.</em></h1>
    <p>Landscapes &middot; Streets &middot; Weddings &middot; Products</p>
  </div>

  <section>
    <div class="filter-bar">
      <span>Show</span>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="landscape">Landscape</button>
      <button class="filter-btn" data-filter="street">Street</button>
      <button class="filter-btn" data-filter="wedding">Wedding</button>
      <button class="filter-btn" data-filter="product">Product</button>
    </div>
    <div class="masonry-grid" id="masonry-grid">
      <!-- Populated by JS from R2 config -->
    </div>
  </section>

  <div class="cta-strip">
    <h2>Like what you see? Let's <em>collaborate.</em></h2>
    <p>Available for weddings, commercial shoots, and editorial projects across India.</p>
    <a href="contact.html" class="btn btn-solid">Book a session</a>
  </div>

  <div id="footer-placeholder"></div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-inner">
      <span class="lightbox-close" id="lb-close">&times;</span>
      <img id="lb-img" src="" alt="" style="max-width:90vw;max-height:78vh;object-fit:contain;border:1px solid var(--border);display:block;" />
      <p class="lightbox-caption" id="lb-caption"></p>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('masonry-grid');
      const photos = [
        { key: 'landscape_1', cat: 'landscape', ratio: '4/3',  title: 'Western Ghats at Dusk',    sub: 'Landscape' },
        { key: 'street_1',    cat: 'street',    ratio: '3/4',  title: 'Dharavi Morning',           sub: 'Street'    },
        { key: 'wedding_1',   cat: 'wedding',   ratio: '1/1',  title: 'First Dance',               sub: 'Wedding'   },
        { key: 'product_1',   cat: 'product',   ratio: '4/5',  title: 'Perfume Bottle — Studio',   sub: 'Product'   },
        { key: 'street_2',    cat: 'street',    ratio: '16/9', title: 'Marine Lines Evening',      sub: 'Street'    },
        { key: 'landscape_2', cat: 'landscape', ratio: '5/4',  title: 'Lonavala Monsoon',          sub: 'Landscape' },
        { key: 'wedding_2',   cat: 'wedding',   ratio: '3/4',  title: 'Mehndi Ceremony',           sub: 'Wedding'   },
        { key: 'product_2',   cat: 'product',   ratio: '1/1',  title: 'Luxury Watch — Close-up',   sub: 'Product'   },
        { key: 'landscape_3', cat: 'landscape', ratio: '16/9', title: 'Mumbai Sunrise',            sub: 'Landscape' },
      ];
      photos.forEach(p => {
        const url = GM.asset(GM.images[p.key]);
        grid.innerHTML += `
          <div class="masonry-item" data-cat="${p.cat}" data-lightbox="${url}" data-caption="${p.title}">
            <div style="position:relative;aspect-ratio:${p.ratio};background:var(--bg-3);overflow:hidden;">
              <img src="${url}" alt="${p.title}" loading="lazy"
                style="width:100%;height:100%;object-fit:cover;display:block;"
                onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
              <div class="photo-placeholder" style="display:none;position:absolute;inset:0;">
                <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity:.2">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><path d="m3 16 5-5 4 4 4-5 5 6"/>
                </svg>
                <span>${p.sub}</span>
              </div>
            </div>
            <div class="photo-card-overlay"><h3>${p.title}</h3><p>${p.sub}</p></div>
          </div>`;
      });
    });
  </script>
</body>
</html>
